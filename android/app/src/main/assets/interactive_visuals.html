<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
  html, body { margin:0; padding:0; height:100%; background:transparent;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; overflow:hidden; }
  #root { position:absolute; left:0; right:0; top:0; display:flex; flex-direction:column; height:300px; }
  #prompt { font-size:13.5px; line-height:1.4; padding:12px 16px 6px 16px; font-weight:650; flex:0 0 auto; letter-spacing:0.1px; }
  #stage { position:relative; flex:1 1 auto; min-height:150px; }
  canvas { display:block; width:100%; height:100%; touch-action:none; }
  #goal { font-size:11px; line-height:1.3; padding:0 16px 10px 16px; opacity:0.62; font-style:italic; flex:0 0 auto; }
  #cover { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; }
  #coverBtn { padding:11px 20px; border-radius:16px; font-size:13px; font-weight:800; border:none; box-shadow:0 6px 16px rgba(0,0,0,0.18); }
  /* Explain step: a soft reflection banner that drops in over the stage after the
     learner has verified — closes the loop with "why?" (retention/transfer). */
  #reflect { position:absolute; left:8px; right:8px; bottom:8px; padding:9px 13px; border-radius:13px;
    font-size:12px; line-height:1.35; font-weight:700; text-align:center; box-shadow:0 4px 14px rgba(0,0,0,0.12); }
  #dbg { position:absolute; left:8px; bottom:4px; font-size:9px; color:#c0392b; font-family:monospace; pointer-events:none; white-space:pre; display:none; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="root">
  <div id="prompt"></div>
  <div id="stage">
    <canvas id="cv"></canvas>
    <div id="cover" class="hidden"><button id="coverBtn">Tap to explore ✦</button></div>
    <div id="reflect" class="hidden"></div>
    <div id="dbg"></div>
  </div>
  <div id="goal"></div>
</div>
<script>
"use strict";

// ===========================================================================
//  Config + theme handshake
// ===========================================================================
var THEME = { bg:"#FFFFFF", surface:"#F2F2F7", primary:"#58CC02", secondary:"#1899D6",
  tertiary:"#FF9600", onSurface:"#2A2A33", border:"#E0E0E6", subtext:"#8A8A95",
  correct:"#58CC02", wrong:"#EA2B2B" };
var SPEC = { type:"none", params:{}, prompt:"", goal:"" };
var HOST_H = 0;
var REDUCE = false;  // reduce-motion: suppress confetti + entrance animation

try { if (window.AndroidBridge && AndroidBridge.getTheme)   THEME   = JSON.parse(AndroidBridge.getTheme()); } catch(e){}
try { if (window.AndroidBridge && AndroidBridge.getSpec)    SPEC    = JSON.parse(AndroidBridge.getSpec());  } catch(e){}
try { if (window.AndroidBridge && AndroidBridge.getHeightDp) HOST_H = AndroidBridge.getHeightDp() || 0;     } catch(e){}
try { if (window.AndroidBridge && AndroidBridge.getReduceMotion) REDUCE = !!AndroidBridge.getReduceMotion(); } catch(e){}
try {
  var qs = new URLSearchParams(window.location.search);
  if (qs.get("spec"))   SPEC   = JSON.parse(decodeURIComponent(qs.get("spec")));
  if (qs.get("theme"))  THEME  = JSON.parse(decodeURIComponent(qs.get("theme")));
  if (qs.get("h"))      HOST_H = parseInt(qs.get("h"), 10) || 0;
  if (qs.get("reduce")) REDUCE = qs.get("reduce") === "1";
} catch(e){}

// --- Explain step -----------------------------------------------------------
// After the learner reaches their first verified insight (solve/discover), drop a
// reflection prompt ("why?"). Closing the loop with self-explanation is the single
// strongest retention/transfer lever — and it never reveals the answer.
var reflectShown = false;
function maybeReflect(){
  if (reflectShown || !SPEC.reflectionPrompt) return;
  reflectShown = true;
  var r = document.getElementById("reflect");
  if (r){ r.textContent = "🤔 " + SPEC.reflectionPrompt; r.style.color = THEME.onSurface;
    r.style.background = rgba(THEME.tertiary, 0.12); r.classList.remove("hidden"); }
  try { if (window.AndroidBridge && AndroidBridge.onEvent)
    AndroidBridge.onEvent(JSON.stringify({ type:SPEC.type, event:"reflect" })); } catch(e){}
}

function postEvent(o){ try { o.type = o.type || SPEC.type;
  if (!reflectShown && (o.event === "solve" || o.event === "discover")) maybeReflect();
  if (window.AndroidBridge && AndroidBridge.onEvent) AndroidBridge.onEvent(JSON.stringify(o)); } catch(e){} }

// ---------------------------------------------------------------------------
// Adaptive scaffolding level (Adaptive Visual Intelligence, inside the canvas).
//   guided  — full captions, hints, labeled supports
//   explore — trimmed captions; hints only after a wrong move
//   ondemand— minimal labels, no hints
// The golden rule for every module: present structure the learner must READ and
// moves the learner must CHOOSE — never print the exercise's answer.
// ---------------------------------------------------------------------------
var GUIDE = SPEC.complexity || "guided";
function guided(){ return GUIDE === "guided"; }
function minimal(){ return GUIDE === "ondemand"; }

// Opaque bg matching the host card keeps the canvas layer compositing reliably.
try { document.documentElement.style.background = THEME.surface; document.body.style.background = THEME.surface; } catch(e){}
// Drive layout from the host height (CSS px == dp here) — WebView viewport height is unreliable.
if (HOST_H > 0) { document.getElementById("root").style.height = HOST_H + "px"; }

// ===========================================================================
//  Canvas plumbing
// ===========================================================================
var cv = document.getElementById("cv");
var ctx = cv.getContext("2d");
var W = 0, H = 0, DPR = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
var needsDraw = true;

function viewW(){ var st=document.getElementById("stage"); return st.clientWidth || document.documentElement.clientWidth || window.innerWidth || 320; }
function viewH(){
  var st=document.getElementById("stage"); var h=st.clientHeight;
  if (h < 60){ // stage collapsed — derive from host height minus the text bands
    var bands = document.getElementById("prompt").offsetHeight + document.getElementById("goal").offsetHeight;
    h = (HOST_H>0 ? HOST_H : (window.innerHeight||260)) - bands;
  }
  return Math.max(140, h);
}
function resize(){
  W = viewW(); H = viewH();
  cv.width = Math.round(W*DPR); cv.height = Math.round(H*DPR);
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if (active){ if (active.layout) active.layout(); paint(); requestRender(); }
  else needsDraw = true;
}

// ===========================================================================
//  Math / easing / color helpers
// ===========================================================================
var TAU = Math.PI*2;
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function easeOutCubic(t){ t=clamp(t,0,1); return 1-Math.pow(1-t,3); }
function easeInOutCubic(t){ t=clamp(t,0,1); return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; }
function easeOutBack(t){ t=clamp(t,0,1); var c1=1.70158,c3=c1+1; return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2); }

function hexToRgb(h){ h=(h||"#000").replace("#",""); if(h.length===3) h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];
  var n=parseInt(h,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function rgba(hex,a){ var c=hexToRgb(hex); return "rgba("+c[0]+","+c[1]+","+c[2]+","+a+")"; }
function shade(hex,amt){ var c=hexToRgb(hex); // amt>0 lighten, <0 darken
  function f(x){ return Math.round(clamp(amt>0 ? x+(255-x)*amt : x*(1+amt), 0,255)); }
  return "rgb("+f(c[0])+","+f(c[1])+","+f(c[2])+")"; }

// ===========================================================================
//  Spring — eased animated scalar
// ===========================================================================
function Spring(v,k){ this.cur=(v||0); this.tgt=this.cur; this.k=(k||0.22); }
Spring.prototype.to  = function(t){ this.tgt=t; return this; };
Spring.prototype.set = function(v){ this.cur=this.tgt=v; return this; };
Spring.prototype.step= function(){ this.cur += (this.tgt-this.cur)*this.k; if(Math.abs(this.tgt-this.cur)<0.0006) this.cur=this.tgt; return this.cur; };
Spring.prototype.moving = function(){ return Math.abs(this.tgt-this.cur)>0.0012; };

// ===========================================================================
//  Premium draw helpers
// ===========================================================================
function rr(x,y,w,h,r){ r=Math.min(r,Math.abs(w)/2,Math.abs(h)/2); ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
function fillRR(x,y,w,h,r,col){ rr(x,y,w,h,r); ctx.fillStyle=col; ctx.fill(); }
function strokeRR(x,y,w,h,r,col,lw){ rr(x,y,w,h,r); ctx.strokeStyle=col; ctx.lineWidth=lw||2; ctx.stroke(); }
// vertical gradient rounded rect with soft top sheen
function gradRR(x,y,w,h,r,col){ rr(x,y,w,h,r);
  var g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,shade(col,0.18)); g.addColorStop(1,shade(col,-0.10));
  ctx.fillStyle=g; ctx.fill(); }
function shadowOn(blur,col,dy){ ctx.save(); ctx.shadowBlur=blur; ctx.shadowColor=col; ctx.shadowOffsetY=dy||0; }
function shadowOff(){ ctx.restore(); }
function glow(x,y,r,col,inten){ var g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,rgba(col,inten)); g.addColorStop(1,rgba(col,0));
  ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,TAU); ctx.fill(); }
function text(s,x,y,size,col,align,weight){ ctx.fillStyle=col||THEME.onSurface;
  ctx.font=(weight||"600")+" "+(size||14)+"px -apple-system,Roboto,Arial,sans-serif";
  ctx.textAlign=align||"center"; ctx.textBaseline="middle"; ctx.fillText(s,x,y); }

// ---- on-canvas pill buttons with press feedback -------------------------
var buttons = [];
var pressSpring = {}; // id -> Spring(scale)
function button(id,x,y,w,h,label,col,disabled,onTap){
  if(!pressSpring[id]) pressSpring[id]=new Spring(1,0.35);
  var b={id:id,x:x,y:y,w:w,h:h,label:label,col:col||THEME.primary,disabled:!!disabled,onTap:onTap};
  buttons.push(b); return b;
}
function drawButtons(){
  for(var i=0;i<buttons.length;i++){ var b=buttons[i]; var sp=pressSpring[b.id]; var s=sp?sp.step():1;
    var cx=b.x+b.w/2, cy=b.y+b.h/2; ctx.save(); ctx.translate(cx,cy); ctx.scale(s,s); ctx.translate(-cx,-cy);
    if(!b.disabled){ shadowOn(12*s, rgba(b.col,0.45), 4*s); fillRR(b.x,b.y,b.w,b.h,b.h/2.4, b.col); shadowOff();
      var g=ctx.createLinearGradient(0,b.y,0,b.y+b.h); g.addColorStop(0,shade(b.col,0.22)); g.addColorStop(1,shade(b.col,-0.06));
      rr(b.x,b.y,b.w,b.h,b.h/2.4); ctx.fillStyle=g; ctx.fill();
      text(b.label,cx,cy,13.5,"#FFFFFF","center","800");
    } else {
      fillRR(b.x,b.y,b.w,b.h,b.h/2.4, rgba(THEME.subtext,0.16));
      text(b.label,cx,cy,13.5, THEME.subtext,"center","700");
    }
    ctx.restore();
  }
}
function hit(b,x,y){ var pad=8; return x>=b.x-pad&&x<=b.x+b.w+pad&&y>=b.y-pad&&y<=b.y+b.h+pad; }
function pressBtn(b){ if(pressSpring[b.id]) pressSpring[b.id].set(0.9).to(1); }

// ---- particles (celebration) --------------------------------------------
var particles=[];
function burst(x,y,colors,n){ n=n||26; for(var i=0;i<n;i++){ var a=Math.random()*TAU, sp=2+Math.random()*5.5;
  particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,
    col:colors[(Math.random()*colors.length)|0], sz:3+Math.random()*4, rot:Math.random()*TAU, vr:(Math.random()-0.5)*0.4}); } }
function stepParticles(dt){ for(var i=particles.length-1;i>=0;i--){ var p=particles[i];
  p.vy+=14*dt; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life-=dt*1.05; if(p.life<=0) particles.splice(i,1); } }
function drawParticles(){ for(var i=0;i<particles.length;i++){ var p=particles[i]; ctx.save();
  ctx.globalAlpha=clamp(p.life,0,1); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
  fillRR(-p.sz/2,-p.sz/2,p.sz,p.sz*1.4,1.5,p.col); ctx.restore(); } }

// ===========================================================================
//  Animation loop  (runs only while something is moving, then idles)
// ===========================================================================
var clock=0, lastTs=0, entrance=0, lastErr="";
var rafPending=false;
function requestRender(){ if(!rafPending){ rafPending=true; requestAnimationFrame(frame); } }
function frame(ts){ rafPending=false;
  if(!lastTs) lastTs=ts; var dt=Math.min(0.05,(ts-lastTs)/1000); lastTs=ts; clock+=dt;
  entrance=Math.min(1, entrance + dt/0.55);
  if(active && active.update) active.update(dt);
  stepParticles(dt);
  paint();
  if(anyAnim()) requestRender(); else lastTs=0;
}
function anyAnim(){ if(entrance<1) return true; if(particles.length>0) return true;
  if(active && active.animating && active.animating()) return true;
  for(var k in pressSpring) if(pressSpring[k].moving()) return true;
  return false;
}
function clearCanvas(){ ctx.clearRect(0,0,W,H); }
function paint(){
  try{
    clearCanvas();
    var e=easeOutCubic(entrance);
    ctx.save();
    ctx.globalAlpha=e;
    var s=0.97+0.03*e, oy=(1-e)*10;
    ctx.translate(W/2,H/2+oy); ctx.scale(s,s); ctx.translate(-W/2,-H/2);
    buttons.length=0;
    if(active) active.draw();
    drawButtons();
    ctx.restore();
    drawParticles();
    lastErr="";
  }catch(err){ lastErr=(err&&err.message)||String(err);
    var d=document.getElementById("dbg"); if(d){ d.style.display="block"; d.textContent="ERR "+lastErr; } }
  needsDraw=false;
}
function celebrate(x,y){ if(!REDUCE) burst(x,y,[THEME.primary,THEME.secondary,THEME.tertiary,"#FFD54A"],30); requestRender(); }

// ===========================================================================
//  MODULE REGISTRY
// ===========================================================================
var MODULES={}; var active=null;

// =================== BALANCE SCALE =========================================
// Redesigned: the learner CHOOSES each move from a palette of legal moves and
// tempting decoys. Wrong moves tilt the beam (visible consequence) and undo.
// The final state shows x alone vs a pan of unit blocks — the module NEVER
// prints "x = N"; the learner counts the blocks themselves.
MODULES.balance_scale = (function(){
  var a,b,c,sol,solved;
  var beam, tiltErr, popT, glowT, hintA, hintMsg, busyT;
  function init(s){ a=s.params.a; b=s.params.b||0; c=s.params.c; sol=s.params.solution;
    solved=false; tiltErr=0; popT=0; glowT=0; busyT=0; hintMsg="";
    hintA=new Spring(0,0.18); beam=new Spring(0,0.14);
    ax=a; lb=b; rb=c; }
  var ax,lb,rb;
  function weight(){ return (ax*sol+lb)-rb; }
  function isolated(){ return ax===1 && lb===0; }
  function finishIfIsolated(){
    if(isolated() && !solved){ solved=true; glowT=1;
      postEvent({event:"solve",detail:"isolated"}); celebrate(W/2, H*0.40); }
  }
  // -- the move palette ------------------------------------------------------
  // Legal: subtract m from BOTH sides; divide BOTH sides by d (only if clean).
  // Decoys: subtract from one side only (tilts), divide when pieces don't split.
  function subBoth(m){ if(busyT>0||solved) return;
    if(lb-m < 0 && lb >= 0){ wobble("Not that many unit blocks on the left."); return; }
    lb-=m; rb-=m; popT=0; postEvent({event:"manipulate",detail:"sub_both:"+m});
    if(rb<0){ wobble("The right pan went below zero — undo."); lb+=m; rb+=m; return; }
    finishIfIsolated(); requestRender(); }
  function addBoth(m){ if(busyT>0||solved) return;
    if(lb+m > 0 && lb <= 0){ wobble("That adds more than you owe on the left."); return; }
    lb+=m; rb+=m; popT=0; postEvent({event:"manipulate",detail:"add_both:"+m});
    finishIfIsolated(); requestRender(); }
  function subLeftOnly(m){ if(busyT>0||solved) return;
    var oldLb=lb; lb=lb>0?Math.max(0,lb-m):Math.min(0,lb+m); tiltErr=weight()||3; busyT=1.2; hintA.to(1);
    hintMsg = guided() ? "⚖ Unbalanced! What you do to one side, do to the other." : "⚖ Unbalanced!";
    postEvent({event:"discover",detail:"one_side_decoy"});
    setTimeout(function(){ lb=oldLb; tiltErr=0; hintA.to(0); busyT=0; requestRender(); }, 1200);
    requestRender(); }
  function divBoth(d){ if(busyT>0||solved) return;
    if(lb!==0){ wobble(guided() ? "Clear the loose blocks first — then split into groups." : "Loose blocks in the way."); return; }
    if(ax%d!==0 || rb%d!==0){ wobble("Those pieces don't split evenly into "+d+" groups."); return; }
    ax/=d; rb/=d; popT=0; postEvent({event:"manipulate",detail:"div_both:"+d});
    finishIfIsolated(); requestRender(); }
  function wobble(msg){ tiltErr=3; busyT=0.9; hintA.to(1); hintMsg=msg;
    setTimeout(function(){ tiltErr=0; hintA.to(0); busyT=0; requestRender(); }, 950); requestRender(); }

  function layout(){}
  function update(dt){ beam.to(clamp(-tiltErr*0.05,-0.20,0.20)); beam.step();
    popT=Math.min(1,popT+dt/0.45); glowT=Math.max(0,glowT-dt*0.4); hintA.step(); }
  function animating(){ return beam.moving() || popT<1 || glowT>0 || hintA.moving(); }

  function draw(){
    var cx=W/2, top=H*0.12, beamY=top+8, halfW=Math.min(150, W*0.34);
    if(glowT>0) glow(cx, beamY+70, 150, THEME.correct, 0.35*glowT);
    // central post
    ctx.strokeStyle=rgba(THEME.subtext,0.5); ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(cx,beamY); ctx.lineTo(cx,beamY+96); ctx.stroke();
    fillRR(cx-16,beamY+92,32,12,5, rgba(THEME.subtext,0.5));
    var ang=beam.cur;
    // beam
    ctx.save(); ctx.translate(cx,beamY); ctx.rotate(ang);
    shadowOn(10, rgba(THEME.secondary,0.4), 3);
    rr(-halfW,-5,halfW*2,10,5);
    var bg=ctx.createLinearGradient(0,-5,0,5); bg.addColorStop(0,shade(THEME.secondary,0.2)); bg.addColorStop(1,shade(THEME.secondary,-0.1));
    ctx.fillStyle=bg; ctx.fill(); shadowOff();
    ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(0,0,8,0,TAU); ctx.fill();
    ctx.fillStyle=THEME.secondary; ctx.beginPath(); ctx.arc(0,0,4.5,0,TAU); ctx.fill();
    ctx.restore();
    function anchor(sign){ return { x:cx+sign*halfW*Math.cos(ang), y:beamY+sign*halfW*Math.sin(ang) }; }
    var L=anchor(-1), R=anchor(1);
    drawPan(L.x, beamY, "L"); drawPan(R.x, beamY, "R");
    // equation — the final state stays a QUESTION; the learner counts the pan.
    var eq = solved ? "x = ?"
      : ((ax>1?ax:(ax===1?"":ax))+"x"+(lb>0?" + "+lb:(lb<0?" − "+(-lb):""))+" = "+rb);
    text(eq, cx, beamY+126, solved?20:17, solved?THEME.correct:THEME.onSurface, "center","800");
    if(solved) text("x alone — count the blocks on the right pan", cx, beamY+148, 12, THEME.correct,"center","700");
    // hint
    if(hintA.cur>0.02){ ctx.globalAlpha=hintA.cur;
      text(hintMsg, cx, beamY+150, 11.5, THEME.wrong,"center","700");
      ctx.globalAlpha=1; }
    // ---- move palette (the learner decides; decoys included) --------------
    if(!solved){
      var chips=[];
      if(lb>0){
        chips.push({label:"− 1 both", col:THEME.primary, tap:function(){ subBoth(1); }});
        if(lb>1) chips.push({label:"− "+lb+" both", col:THEME.primary, tap:function(){ subBoth(lb); }});
        chips.push({label:"− "+lb+" left only", col:THEME.tertiary, tap:function(){ subLeftOnly(lb); }});
      } else if(lb<0){
        var owe=-lb;
        chips.push({label:"+ 1 both", col:THEME.primary, tap:function(){ addBoth(1); }});
        if(owe>1) chips.push({label:"+ "+owe+" both", col:THEME.primary, tap:function(){ addBoth(owe); }});
        chips.push({label:"+ "+owe+" left only", col:THEME.tertiary, tap:function(){ subLeftOnly(owe); }});
      } else if(ax>1){
        var d1=2, dA=ax;
        chips.push({label:"split in "+dA, col:THEME.primary, tap:function(){ divBoth(dA); }});
        if(dA!==d1) chips.push({label:"split in "+d1, col:THEME.secondary, tap:function(){ divBoth(d1); }});
        var bad=dA+1; chips.push({label:"split in "+bad, col:THEME.tertiary, tap:function(){ divBoth(bad); }});
      }
      var bh=38, gap=8, totW=0, widths=[];
      for(var i=0;i<chips.length;i++){ var w=Math.max(86, chips[i].label.length*8+26); widths.push(w); totW+=w; }
      totW+=gap*(chips.length-1);
      var scaleF = totW > W-24 ? (W-24)/totW : 1;
      var x=cx-(totW*scaleF)/2, by=H-bh-10;
      for(var j=0;j<chips.length;j++){ var cw=widths[j]*scaleF;
        button("chip"+j, x, by, cw, bh, chips[j].label, chips[j].col, false, chips[j].tap);
        x+=cw+gap*scaleF; }
      if(guided()) text("Pick a move — only equal moves keep it balanced", cx, by-14, 11, THEME.subtext,"center","600");
    }
  }
  function drawPan(px, beamY, side){
    var hangTop=beamY, py=beamY+92, pw=128;
    ctx.strokeStyle=rgba(THEME.subtext,0.4); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(px,hangTop); ctx.lineTo(px-pw/2+8,py); ctx.moveTo(px,hangTop); ctx.lineTo(px+pw/2-8,py); ctx.stroke();
    shadowOn(10, rgba(0,0,0,0.12), 4);
    rr(px-pw/2, py, pw, 14, 7); var tg=ctx.createLinearGradient(0,py,0,py+14);
    tg.addColorStop(0,shade(THEME.surface,-0.04)); tg.addColorStop(1,shade(THEME.surface,-0.14));
    ctx.fillStyle=tg; ctx.fill(); shadowOff();
    strokeRR(px-pw/2,py,pw,14,7, rgba(THEME.subtext,0.25),1);
    var tiles=[];
    if(side==="L"){ for(var i=0;i<ax;i++) tiles.push("x"); for(var j=0;j<Math.abs(lb);j++) tiles.push(lb<0?"-1":"1"); }
    else { for(var k=0;k<Math.abs(rb);k++) tiles.push(rb<0?"-1":"1"); }

MODULES.right_triangle = (function(){

// =================== PARABOLA ==============================================
// Redesigned: numeric roots are never printed. Root markers appear only AFTER

MODULES.parabola = (function(){
  var a,b,c,sliders,pulse,touched;
  function init(s){ a=s.params.a; b=s.params.b||0; c=s.params.c||0; pulse=0; touched=false; }

      {key:"b",min:-8,max:8,y:y0+sp,get:function(){return b;},set:function(v){b=v;},col:THEME.secondary},
      {key:"c",min:-8,max:8,y:y0+2*sp,get:function(){return c;},set:function(v){c=v;},col:THEME.tertiary} ];
    sliders.forEach(function(s){ s.x=x0+46; s.w=W-44-46; }); }
  function update(dt){ pulse+=dt; }

  function draw(){
    if(!sliders) layout();
    var gx=W/2, plotH=H-96, gy=plotH*0.56, sx=Math.min(W,440)/16, sy=Math.min(plotH*0.9,250)/16;
    // grid

    for(var gxn=gx%sx; gxn<W; gxn+=sx){ ctx.beginPath(); ctx.moveTo(gxn,0); ctx.lineTo(gxn,plotH); ctx.stroke(); }
    for(var gyn=gy%sy; gyn<plotH; gyn+=sy){ ctx.beginPath(); ctx.moveTo(0,gyn); ctx.lineTo(W,gyn); ctx.stroke(); }
    ctx.strokeStyle=rgba(THEME.subtext,0.45); ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.moveTo(gx,4); ctx.lineTo(gx,plotH); ctx.stroke();
    // axis numerals — so crossing positions can be READ from the graph

      if(tx>6&&tx<W-6) text(""+tv, tx, gy+11, 9, rgba(THEME.subtext,0.8),"center","600"); }

    for(var px=0;px<=W;px+=2){ var xv=(px-gx)/sx, yv=a*xv*xv+b*xv+c, py=gy-yv*sy;

    ctx.fillStyle=rgba(THEME.primary,0.10); ctx.fill();
    // curve

// =================== NUMBER LINE ===========================================
MODULES.number_line = (function(){
  var mode,val,mod,start,delta,pos,target,hops,markX,arc;
  function init(s){ mode=s.mode; val=s.params.value; mod=s.params.modulus; start=s.params.start; delta=s.params.delta;
    pos=(mode==="modulo")?0:start; target=pos; hops=0; markX=new Spring(0,0.18); arc=0; }
  var x0,x1,y,lo,hi,scale;
  function layout(){ x0=26; x1=W-26; y=H*0.52;
    if(mode==="modulo"){ lo=0; hi=Math.max(val,mod)+1; } else { lo=Math.min(start,start+delta)-2; hi=Math.max(start,start+delta)+2; }
    scale=(x1-x0)/(hi-lo); markX.set(X(pos)); }
  function X(v){ return x0+(v-lo)*scale; }
  function update(dt){ markX.to(X(pos)).step(); arc=Math.max(0,arc-dt*2.2); }
  function animating(){ return markX.moving()||arc>0; }
  function draw(){
    if(!scale) layout();
    // baseline
    ctx.strokeStyle=rgba(THEME.subtext,0.35); ctx.lineWidth=3; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
    for(var v=Math.ceil(lo);v<=Math.floor(hi);v++){ var px=X(v);
      ctx.strokeStyle=rgba(THEME.subtext,0.3); ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(px,y-7); ctx.lineTo(px,y+7); ctx.stroke();
      text(""+v, px, y+22, 10.5, THEME.subtext,"center","600"); }
    // completed hops as arcs (modulo)
    if(mode==="modulo"){ var done=0; for(var k=0;k+mod<=pos+0.01;k+=mod){ drawHop(X(k),X(k+mod),0.5); } }
    // moving marker
    var mx=markX.cur;
    glow(mx,y,16,THEME.primary,0.4);
    shadowOn(8,rgba(THEME.primary,0.5),3); ctx.fillStyle=THEME.primary; ctx.beginPath(); ctx.arc(mx,y,11,0,TAU); ctx.fill(); shadowOff();
    ctx.strokeStyle="#FFF"; ctx.lineWidth=2.5; ctx.stroke();
    // titles + action — the question stays a question; the learner reads the
    // line where THEY landed (they performed every jump themselves).
    if(mode==="modulo"){ var done2=pos+mod>val;
      text(val+" mod "+mod+" = ?", W/2, H*0.18, 16, THEME.onSurface,"center","800");
      text(done2
          ? (guided() ? "no full jump fits — the leftover distance is your remainder" : "no more full jumps — read the marker")
          : (guided() ? "keep jumping in equal steps of "+mod : "keep jumping"),
        W/2, H-66, 12.5, done2?THEME.correct:THEME.subtext,"center","700");
      button("jmp", W/2-115, H-48, 230, 40, done2?"Where did you land?":("Jump + "+mod), done2?THEME.correct:THEME.primary, done2, jumpMod);
    } else { var done3=hops>=Math.abs(delta);
      text(start+(delta<0?" − "+(-delta):" + "+delta)+" = ?", W/2, H*0.18, 16, THEME.onSurface,"center","800");
      text(done3
          ? "all hops done — read the marker off the line"
          : (guided() ? (Math.abs(delta)-hops)+" hop"+((Math.abs(delta)-hops)===1?"":"s")+" to go" : ""),
        W/2, H-66, 12.5, done3?THEME.correct:THEME.subtext,"center","700");
      button("hop", W/2-115, H-48, 230, 40, done3?"Where did you land?":(delta<0?"Hop left":"Hop right"), done3?THEME.correct:THEME.primary, done3, hop);
    }
  }
  function drawHop(xa,xb,alpha){ var r=(xb-xa)/2, cx=(xa+xb)/2;
    ctx.strokeStyle=rgba(THEME.tertiary,alpha); ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(cx,y,r,Math.PI,TAU); ctx.stroke(); }
  function jumpMod(){ if(pos+mod<=val){ pos+=mod; arc=1; postEvent({event:"manipulate",detail:"pos:"+pos});
    if(pos+mod>val){ postEvent({event:"solve",detail:"remainder:"+pos}); celebrate(W/2,H*0.4); } requestRender(); } }
  function hop(){ if(hops<Math.abs(delta)){ pos+=(delta<0?-1:1); hops++; arc=1; requestRender();
    if(hops>=Math.abs(delta)){ postEvent({event:"solve",detail:"result:"+pos}); celebrate(W/2,H*0.4); } } }
  function down(x,y){ for(var i=0;i<buttons.length;i++) if(hit(buttons[i],x,y)){ pressBtn(buttons[i]); buttons[i].onTap(); return; } }
  return { init:init, layout:layout, update:update, animating:animating, draw:draw, down:down };
})();

// =================== PERCENT BAR ===========================================
// Percentages as structure: a quantity bar split into ten 10% cells. The
// learner SLIDES to the target percent themselves; each cell is worth a tenth
// of the whole, so they assemble the part by counting cells — the visual never
// prints the part's value.
MODULES.percent_bar = (function(){
  var pct,base,handle,reached;
  function init(s){ pct=s.params.percent; base=s.params.base; handle=new Spring(0,0.2); cur=0; reached=false; }
  var cur, gx,gy,gw,gh;
  function layout(){ gx=26; gw=W-52; gh=Math.min(58,H*0.22); gy=H*0.34; handle.set(gx); }
  function X(p){ return gx + clamp(p,0,100)/100*gw; }
  function update(dt){ handle.to(X(cur)).step(); }
  function animating(){ return handle.moving(); }
  function draw(){
    if(!gw) layout();
    text(pct+"% of "+base+" = ?", W/2, H*0.14, 16, THEME.onSurface,"center","800");
    // track
    fillRR(gx,gy,gw,gh,10, rgba(THEME.subtext,0.10));
    // shaded part up to the handle
    var hx=handle.cur, fw=hx-gx;
    if(fw>1){ ctx.save(); rr(gx,gy,gw,gh,10); ctx.clip();
      var fg=ctx.createLinearGradient(0,gy,0,gy+gh); fg.addColorStop(0,shade(THEME.primary,0.18)); fg.addColorStop(1,shade(THEME.primary,-0.08));
      ctx.fillStyle=fg; ctx.fillRect(gx,gy,fw,gh); ctx.restore(); }
    // ten 10% cells — the countable structure
    ctx.strokeStyle=rgba(THEME.surface,0.9); ctx.lineWidth=2;
    for(var i=1;i<10;i++){ var sx=gx+i*gw/10; ctx.beginPath(); ctx.moveTo(sx,gy+2); ctx.lineTo(sx,gy+gh-2); ctx.stroke(); }
    strokeRR(gx,gy,gw,gh,10, rgba(THEME.subtext,0.2),1.5);
    // endpoints + cell worth (structure, not the answer)
    text("0", gx, gy+gh+16, 11, THEME.subtext,"center","600");
    text(""+base, gx+gw, gy+gh+16, 11, THEME.subtext,"center","600");
    if(guided()) text("each cell = "+(base%10===0?(base/10):("a tenth of "+base)), W/2, gy+gh+16, 11, THEME.subtext,"center","600");
    // target tick (where the learner must reach)
    var txp=X(pct);
    ctx.setLineDash([4,4]); ctx.strokeStyle=rgba(THEME.tertiary,0.8); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(txp,gy-14); ctx.lineTo(txp,gy+gh+6); ctx.stroke(); ctx.setLineDash([]);
    text(pct+"%", txp, gy-24, 11.5, THEME.tertiary,"center","800");
    // handle
    glow(hx,gy+gh/2,16,THEME.primary,0.4);
    shadowOn(8,rgba(THEME.primary,0.5),3); ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(hx,gy+gh/2,12,0,TAU); ctx.fill(); shadowOff();
    ctx.fillStyle=THEME.primary; ctx.beginPath(); ctx.arc(hx,gy+gh/2,7,0,TAU); ctx.fill();
    text(Math.round(cur)+"%", hx, gy-8, 11.5, THEME.primary,"center","800");
    // status — never the part's value
    var on = Math.abs(cur-pct)<=1;
    if(on && !reached){ reached=true; postEvent({event:"discover",detail:"reached_percent"}); celebrate(txp, gy); }
    if(!on) reached=false;
    text(on ? "you're at "+pct+"% — count the shaded cells to build the part"
            : (guided() ? "slide the handle to the dashed "+pct+"% mark" : "slide to the mark"),
      W/2, H-24, 12.5, on?THEME.correct:THEME.subtext,"center","700");
  }
  var drag=false;
  function down(x,y){ if(Math.abs(y-(gy+gh/2))<44){ drag=true; setFrom(x); } }
  function move(x){ if(drag) setFrom(x); }
  function setFrom(x){ cur=clamp((x-gx)/gw*100,0,100); requestRender(); }
  function up(){ if(drag){ postEvent({event:"manipulate",detail:"percent:"+Math.round(cur)}); drag=false; } }
  return { init:init, layout:layout, update:update, animating:animating, draw:draw, down:down, move:move, up:up };
})();

// =================== RATIO DOUBLE NUMBER LINE ==============================
// Ratios as two quantities scaling in LOCKSTEP: a double number line. The
// learner drags the multiplier; the top line marks k·a, the bottom k·b, always
// vertically aligned. Equivalent pairs are found by the learner's own scaling —
// the module never solves a proportion for them.
MODULES.ratio_line = (function(){
  var a,b,k,ks;
  function init(s){ a=s.params.a; b=s.params.b; k=1; ks=new Spring(1,0.2); }
  var x0,x1,yT,yB,maxK,scale;
  function layout(){ x0=30; x1=W-30; yT=H*0.32; yB=H*0.58;
    maxK=Math.max(2, Math.min(12, Math.floor(60/Math.max(a,b))));
    scale=(x1-x0)/(maxK*Math.max(a,b)); }
  function X(v){ return x0+v*scale; }
  function update(dt){ ks.to(k).step(); }
  function animating(){ return ks.moving(); }
  function drawLine(y,unit,col,name){
    ctx.strokeStyle=rgba(THEME.subtext,0.35); ctx.lineWidth=3; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(x0,y); ctx.lineTo(x1,y); ctx.stroke();
    for(var i=0;i<=maxK;i++){ var px=X(i*unit); if(px>x1+1) break;
      ctx.strokeStyle=rgba(col,0.55); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(px,y-6); ctx.lineTo(px,y+6); ctx.stroke();
      text(""+(i*unit), px, y+18, 9.5, THEME.subtext,"center","600"); }
    text(name, x0-4, y-18, 11, col,"left","800");
  }
  function draw(){
    if(!scale) layout();
    var kv=ks.cur;
    text("ratio "+a+" : "+b, W/2, H*0.12, 15, THEME.onSurface,"center","800");
    drawLine(yT, a, THEME.primary, "×"+a);
    drawLine(yB, b, THEME.secondary, "×"+b);
    // lockstep markers + connector
    var pxT=X(kv*a), pxB=X(kv*b);
    ctx.setLineDash([4,4]); ctx.strokeStyle=rgba(THEME.tertiary,0.6); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(pxT,yT); ctx.lineTo(pxB,yB); ctx.stroke(); ctx.setLineDash([]);
    [{x:pxT,y:yT,c:THEME.primary},{x:pxB,y:yB,c:THEME.secondary}].forEach(function(m){
      glow(m.x,m.y,14,m.c,0.4);
      shadowOn(6,rgba(m.c,0.5),2); ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(m.x,m.y,10,0,TAU); ctx.fill(); shadowOff();
      ctx.fillStyle=m.c; ctx.beginPath(); ctx.arc(m.x,m.y,6,0,TAU); ctx.fill(); });
    // the pair the learner has built — equivalent ratio, read off the lines
    text("×"+k+"  →  "+(k*a)+" : "+(k*b), W/2, yB+44, 14, THEME.onSurface,"center","800");
    text(guided()
      ? "drag sideways — both quantities scale together, so every pair you make is the SAME ratio"
      : "drag to scale both lines together", W/2, H-22, 11.5, THEME.subtext,"center","600");
  }
  var drag=false;
  function down(x,y){ if(y>yT-34 && y<yB+34){ drag=true; setFrom(x); } }
  function move(x){ if(drag) setFrom(x); }
  function setFrom(x){ var kk=clamp(Math.round((x-x0)/(scale*a)),1,maxK);
    if(kk!==k){ k=kk; requestRender(); } }
  function up(){ if(drag){ postEvent({event:"manipulate",detail:"k:"+k+" pair:"+(k*a)+":"+(k*b)}); drag=false; } }
  return { init:init, layout:layout, update:update, animating:animating, draw:draw, down:down, move:move, up:up };
})();

// =================== SHAPE GRID (2D area) ==================================
// Area on a unit grid. rect: drag a corner to build L×W, count squares. triangle:
// tap to mirror the copy and see the triangle is half its b×h rectangle.
// parallelogram: shear it until it becomes a b×h rectangle (same base+height ⇒
// same area). The area number is never printed — it is counted in unit squares.
MODULES.shape_grid = (function(){
  var mode,L,Wd,b,h,maxD,cu,cv,mirrored,shear,initShear,drag,done,tappedSides,compW,compH,cutW,cutH,cut,tb1,tb2;
  function init(s){ mode=s.mode; done=false; drag=null; mirrored=false;
    if(mode==="rect"){ L=s.params.l; Wd=s.params.w; maxD=Math.max(L,Wd)+1; cu=0; cv=0; }
    else if(mode==="triangle"){ b=s.params.b; h=s.params.h; maxD=Math.max(b,h)+1; }
    else if(mode==="perimeter"){ L=s.params.l; Wd=s.params.w; maxD=Math.max(L,Wd)+1; tappedSides={}; }
    else if(mode==="composite"){ compW=s.params.w; compH=s.params.h; cutW=s.params.cw; cutH=s.params.ch; cut=false; maxD=Math.max(compW,compH)+1; }
    else if(mode==="trapezoid"){ tb1=s.params.b1; tb2=s.params.b2; h=s.params.h; maxD=Math.max(tb2,h)+1; }
    else { b=s.params.b; h=s.params.h; initShear=clamp(Math.round(b*0.5),2,4); shear=initShear; maxD=Math.max(b+initShear,h)+1; } }
  var ox,oy,u,rectHandle,parHandle,sideGeo;
  function layout(){ u=clamp(Math.min((W-50)/maxD, (H*0.56)/maxD),12,42); ox=(W-maxD*u)/2; oy=H*0.18+maxD*u; }
  function X(v){ return ox+v*u; } function Y(v){ return oy-v*u; }
  function update(){} function animating(){ return false; }
  function grid(){ ctx.strokeStyle=rgba(THEME.subtext,0.12); ctx.lineWidth=1;
    for(var i=0;i<=maxD;i++){ ctx.beginPath(); ctx.moveTo(X(i),Y(0)); ctx.lineTo(X(i),Y(maxD)); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(X(0),Y(i)); ctx.lineTo(X(maxD),Y(i)); ctx.stroke(); } }
  function fillCells(w,hh,col){ for(var a=0;a<w;a++) for(var c=0;c<hh;c++) gradRR(X(a)+1,Y(c+1)+1,u-2,u-2,3,col); }
  function handle(hx,hy){ glow(hx,hy,14,THEME.primary,0.4); shadowOn(6,rgba(THEME.primary,0.5),2);
    ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(hx,hy,11,0,TAU); ctx.fill(); shadowOff();
    ctx.fillStyle=THEME.primary; ctx.beginPath(); ctx.arc(hx,hy,6,0,TAU); ctx.fill(); }
  function draw(){
    if(!u) layout(); grid();
    if(mode==="rect") drawRect(); else if(mode==="triangle") drawTri(); else if(mode==="perimeter") drawPerim(); else if(mode==="composite") drawComposite(); else if(mode==="trapezoid") drawTrap(); else drawPar();
  }
  function drawTrap(){
    text("area of the trapezoid = ? square units", W/2, H*0.10, 13, THEME.onSurface,"center","800");
    // right trapezoid: (0,0)–(tb2,0)–(tb1,h)–(0,h). Splits at x=tb1 into a rectangle
    // [0,tb1]×[0,h] plus the right triangle (tb1,0)–(tb2,0)–(tb1,h).
    fillCells(tb1,h,THEME.primary);
    tri([[tb1,0],[tb2,0],[tb1,h]],THEME.secondary);
    ctx.setLineDash([5,4]); ctx.strokeStyle=rgba(THEME.tertiary,0.7); ctx.lineWidth=2;
    ctx.strokeRect(X(tb1),Y(h),(tb2-tb1)*u,h*u); ctx.setLineDash([]);
    if(mirrored) tri([[tb2,0],[tb1,h],[tb2,h]],THEME.secondary);
    ctx.beginPath(); ctx.moveTo(X(0),Y(0)); ctx.lineTo(X(tb2),Y(0)); ctx.lineTo(X(tb1),Y(h)); ctx.lineTo(X(0),Y(h)); ctx.closePath();
    ctx.strokeStyle=THEME.onSurface; ctx.lineWidth=2; ctx.lineJoin="round"; ctx.stroke();
    if(mirrored&&!done){ done=true; postEvent({event:"solve",detail:"trapezoid"}); celebrate(X(tb1),Y(h/2)); }
    text(mirrored? "count the rectangle's squares, then add HALF the triangle's box"
                 : (guided()? "tap the empty corner to complete the triangle into its box" : "complete the triangle's box"),
      W/2, H-16, 12, mirrored?THEME.correct:THEME.subtext,"center","700");
  }
  function drawComposite(){
    text("area of the L-shape = ? square units", W/2, H*0.10, 13, THEME.onSurface,"center","800");
    for(var a=0;a<compW;a++) for(var c=0;c<compH;c++){ var inC=(a>=compW-cutW && c>=compH-cutH);
      var px=X(a)+1, py=Y(c+1)+1;
      if(inC){ if(cut){ ctx.fillStyle=rgba(THEME.subtext,0.06); ctx.fillRect(px,py,u-2,u-2);
          ctx.strokeStyle=rgba(THEME.subtext,0.22); ctx.setLineDash([2,2]); ctx.strokeRect(px,py,u-2,u-2); ctx.setLineDash([]); }
        else { ctx.fillStyle=rgba(THEME.tertiary,0.22); ctx.fillRect(px,py,u-2,u-2);
          ctx.strokeStyle=rgba(THEME.tertiary,0.55); ctx.strokeRect(px,py,u-2,u-2); } }
      else { gradRR(px,py,u-2,u-2,3,THEME.primary); ctx.strokeStyle=rgba(THEME.primary,0.4); ctx.lineWidth=1; ctx.strokeRect(px,py,u-2,u-2); } }
    if(cut&&!done){ done=true; postEvent({event:"solve",detail:"composite"}); celebrate(X(compW/2),Y(compH/2)); }
    text(cut? "count the squares that remain (the big rectangle minus the cut corner)"
            : (guided()? "tap the highlighted corner to cut it away" : "cut the corner"),
      W/2, H-16, 12, cut?THEME.correct:THEME.subtext,"center","700");
  }
  function distSeg(px,py,x1,y1,x2,y2){ var dx=x2-x1,dy=y2-y1,L2=dx*dx+dy*dy; var t=L2?clamp(((px-x1)*dx+(py-y1)*dy)/L2,0,1):0; return Math.hypot(px-(x1+t*dx),py-(y1+t*dy)); }
  function drawPerim(){
    text("perimeter = ? units", W/2, H*0.10, 14, THEME.onSurface,"center","800");
    ctx.fillStyle=rgba(THEME.primary,0.07); ctx.fillRect(X(0),Y(Wd),L*u,Wd*u);
    var sides=[
      {id:"top",x0:X(0),y0:Y(Wd),x1:X(L),y1:Y(Wd),len:L,col:THEME.primary,h:1},
      {id:"bottom",x0:X(0),y0:Y(0),x1:X(L),y1:Y(0),len:L,col:THEME.secondary,h:1},
      {id:"left",x0:X(0),y0:Y(0),x1:X(0),y1:Y(Wd),len:Wd,col:THEME.tertiary,h:0},
      {id:"right",x0:X(L),y0:Y(0),x1:X(L),y1:Y(Wd),len:Wd,col:shade(THEME.primary,-0.25),h:0}
    ];
    sideGeo=sides;
    sides.forEach(function(sd){ var lit=tappedSides[sd.id];
      ctx.strokeStyle=lit?sd.col:rgba(THEME.subtext,0.5); ctx.lineWidth=lit?5:2.5; ctx.lineCap="round";
      ctx.beginPath(); ctx.moveTo(sd.x0,sd.y0); ctx.lineTo(sd.x1,sd.y1); ctx.stroke();
      if(lit){ for(var k=1;k<sd.len;k++){ var t=k/sd.len, tx=sd.x0+(sd.x1-sd.x0)*t, ty=sd.y0+(sd.y1-sd.y0)*t;
          ctx.strokeStyle=rgba(sd.col,0.85); ctx.lineWidth=2; ctx.beginPath();

    if(mode==="product"){ if(hasSplit&&handle&&Math.hypot(x-handle.x,y-handle.y)<32) drag=true; return; }
    if(regX&&x>=regX.x&&x<=regX.x+regX.w&&y>=regX.y&&y<=regX.y+regX.h){ if(!tapX){tapX=true; postEvent({event:"discover",detail:"region_x"});} requestRender(); return; }
    if(regC&&x>=regC.x&&x<=regC.x+regC.w&&y>=regC.y&&y<=regC.y+regC.h){ if(!tapC){tapC=true; postEvent({event:"discover",detail:"region_c"});} requestRender(); return; }
  }
  function move(x){ if(!drag) return;
    if(drag==="fac"){ var n=facPairs.length, sx0=40, sx1=W-40, idx=clamp(Math.round((x-sx0)/(sx1-sx0)*(n-1)),0,n-1);
      if(idx!==facIdx){ facIdx=idx; facA=facPairs[idx][0]; facB=facPairs[idx][1]; postEvent({event:"manipulate",detail:"pair:"+facA+","+facB}); requestRender(); } return; }
    var col=clamp(Math.round((x-gx)/unit),1,a-1);
    if(col!==split){ split=col; if(!moved){moved=true; postEvent({event:"discover",detail:"split"});} requestRender(); } }
  function up(){ if(drag===true){ postEvent({event:"manipulate",detail:"split:"+split}); } drag=false; }
  return { init:init, layout:layout, update:update, animating:animating, draw:draw, down:down, move:move, up:up };
})();

// =================== CIRCLE (π made visible) ===============================
// The circle's area / circumference answers are "in terms of π", so the learner
// reads the COEFFICIENT of π off the construction, never a decimal.
//  area          — build the square on the radius (side = r); count its r² cells.
//                  The circle is drawn over it: it holds about π (≈3.14) squares.
//  circumference — roll the circle one full turn along a diameter-marked track;
//                  one revolution covers exactly π diameters.
MODULES.circle = (function(){
  var mode,r,d,given,sqSide,rolled,drag,done;
  function init(s){ mode=s.mode; done=false; drag=null;
    if(mode==="area"){ r=s.params.r; sqSide=1; }
    else { d=s.params.d; given=s.params.given||"diameter"; rolled=0; } }
  var cx,cy,u,sqHandle,dPx,R,baseY,x0,circleC;
  function layout(){
    if(mode==="area"){ cx=W*0.5; cy=H*0.54; u=clamp(Math.min((W*0.82)/(2*r),(H*0.56)/(2*r)),8,30); }
    else { x0=34; dPx=clamp((W-74)/4.3,24,92); R=dPx/2; baseY=H*0.66; }
  }
  function update(){} function animating(){ return false; }
  function gridCells(x0c,y0c,n,col){ // n×n unit grid (cells of size u), drawn up-right from (x0c,y0c)
    for(var i=0;i<n;i++) for(var j=0;j<n;j++) gradRR(x0c+i*u+1, y0c-(j+1)*u+1, u-2, u-2, 3, col);
    ctx.strokeStyle=rgba(col,0.5); ctx.lineWidth=1; ctx.strokeRect(x0c,y0c-n*u,n*u,n*u);
  }
  function drawArea(){
    if(!u) layout();
    text("the circle's area = ? × π   (π ≈ 3.14)", W/2, H*0.12, 14, THEME.onSurface,"center","800");
    // circle (light) — the learner sees it holds ~π radius-squares
    ctx.fillStyle=rgba(THEME.secondary,0.10); ctx.beginPath(); ctx.arc(cx,cy,r*u,0,TAU); ctx.fill();
    ctx.strokeStyle=rgba(THEME.secondary,0.6); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,r*u,0,TAU); ctx.stroke();
    // radius reference (center → right edge)
    ctx.strokeStyle=THEME.tertiary; ctx.lineWidth=2.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+r*u,cy); ctx.stroke(); ctx.setLineDash([]);
    text("radius", cx+r*u/2, cy-9, 10, THEME.tertiary,"center","700");
    // the square on the radius, built up-right from the centre
    var built=(sqSide===r);
    gridCells(cx, cy, sqSide, THEME.primary);
    text(built? "side = the radius" : "drag to the radius", cx+sqSide*u/2, cy+14, 10, built?THEME.correct:THEME.subtext,"center","700");
    // handle at the square's far corner
    var hx=cx+sqSide*u, hy=cy-sqSide*u;
    glow(hx,hy,14,THEME.primary,0.45); shadowOn(6,rgba(THEME.primary,0.5),2); ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(hx,hy,11,0,TAU); ctx.fill(); shadowOff();
    ctx.fillStyle=THEME.primary; ctx.beginPath(); ctx.arc(hx,hy,6,0,TAU); ctx.fill(); sqHandle={x:hx,y:hy};
    if(built&&!done){ done=true; postEvent({event:"solve",detail:"circle_area"}); celebrate(cx,cy); }
    text(built? "count the r² squares — the circle is about π of them, so area = (that count) × π"
              : (guided()? "drag the corner until the square's side matches the radius" : "match the square to the radius"),
      W/2, H-16, 12, built?THEME.correct:THEME.subtext,"center","700");
  }
  function drawCirc(){
    if(!dPx) layout();
    text("one full roll covers ? diameters", W/2, H*0.12, 14, THEME.onSurface,"center","800");
    // track + diameter marks
    ctx.strokeStyle=rgba(THEME.subtext,0.45); ctx.lineWidth=3; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(x0,baseY); ctx.lineTo(W-20,baseY); ctx.stroke();
    for(var k=0;k<=4;k++){ var mx=x0+k*dPx; ctx.strokeStyle=rgba(THEME.subtext,0.5); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(mx,baseY-6); ctx.lineTo(mx,baseY+6); ctx.stroke();
      if(k>0) text(k+"d", mx, baseY+16, 10, THEME.subtext,"center","700"); }
    // distance trail covered by the rim
    ctx.strokeStyle=THEME.secondary; ctx.lineWidth=5; ctx.lineCap="round";
    ctx.beginPath(); ctx.moveTo(x0,baseY); ctx.lineTo(x0+rolled,baseY); ctx.stroke();
    // the rolling circle
    var cxr=x0+R+rolled, cyr=baseY-R, theta=rolled/R;
    ctx.fillStyle=rgba(THEME.primary,0.12); ctx.beginPath(); ctx.arc(cxr,cyr,R,0,TAU); ctx.fill();
    ctx.strokeStyle=THEME.primary; ctx.lineWidth=2.5; ctx.beginPath(); ctx.arc(cxr,cyr,R,0,TAU); ctx.stroke();
    // spoke + rim dot (started at contact; one full turn returns it to the bottom)
    var dotx=cxr+R*Math.sin(theta), doty=cyr+R*Math.cos(theta);
    ctx.strokeStyle=rgba(THEME.tertiary,0.8); ctx.lineWidth=2; ctx.beginPath(); ctx.moveTo(cxr,cyr); ctx.lineTo(dotx,doty); ctx.stroke();
    ctx.fillStyle=THEME.tertiary; ctx.beginPath(); ctx.arc(dotx,doty,5,0,TAU); ctx.fill();
    // drag handle on the circle
    glow(cxr,cyr,14,THEME.primary,0.35); ctx.fillStyle="#FFF"; ctx.beginPath(); ctx.arc(cxr,cyr,7,0,TAU); ctx.fill();
    ctx.fillStyle=THEME.primary; ctx.beginPath(); ctx.arc(cxr,cyr,4,0,TAU); ctx.fill(); circleC={x:cxr,y:cyr};
    var target=Math.PI*dPx, full=(rolled>=target-0.6);
    if(full&&!done){ done=true; postEvent({event:"solve",detail:"circumference"}); celebrate(cxr,baseY); }
    // contact marker when one full turn is complete
    if(full){ ctx.strokeStyle=THEME.correct; ctx.lineWidth=2; ctx.setLineDash([4,3]);
      ctx.beginPath(); ctx.moveTo(x0+rolled,baseY-R*2-4); ctx.lineTo(x0+rolled,baseY+10); ctx.stroke(); ctx.setLineDash([]); }
    text(full? "one full turn landed just past 3 diameters — that's π; so C = π × diameter"
            : (guided()? "drag the circle right until the orange dot returns to the ground (one full turn)" : "roll one full turn"),
      W/2, H-16, 12, full?THEME.correct:THEME.subtext,"center","700");
  }
  function draw(){ if(mode==="area") drawArea(); else drawCirc(); }
  function down(x,y){
    if(mode==="area"){ if(sqHandle&&Math.hypot(x-sqHandle.x,y-sqHandle.y)<34) drag="sq"; return; }
    if(circleC&&Math.hypot(x-circleC.x,y-circleC.y)<Math.max(34,R+6)) drag="roll"; }
  function move(x){
    if(drag==="sq"){ var ns=clamp(Math.round((x-cx)/u),1,r); if(ns!==sqSide){ sqSide=ns; postEvent({event:"manipulate",detail:"side:"+sqSide}); requestRender(); } }
    else if(drag==="roll"){ var nr=clamp(x-(x0+R),0,Math.PI*dPx); if(Math.abs(nr-rolled)>0.5){ rolled=nr; postEvent({event:"manipulate",detail:"rolled"}); requestRender(); } }
  }
  function up(){ drag=null; }
  return { init:init, layout:layout, update:update, animating:animating, draw:draw, down:down, move:move, up:up };
})();

// ===========================================================================
//  Pointer handling
// ===========================================================================
function pt(e){ var r=cv.getBoundingClientRect(); var s=e.touches?e.touches[0]:e;
  return { x:(s.clientX)-r.left, y:(s.clientY)-r.top }; }
function bindPointers(){
  function down(e){ if(!active) return; var p=pt(e); if(active.down) active.down(p.x,p.y); requestRender(); e.preventDefault(); }
  function move(e){ if(!active||!active.move) return; var p=pt(e); active.move(p.x,p.y); requestRender(); e.preventDefault(); }
  function up(e){ if(active&&active.up) active.up(); requestRender(); if(e&&e.preventDefault) e.preventDefault(); }
  cv.addEventListener("touchstart",down,{passive:false}); cv.addEventListener("touchmove",move,{passive:false}); cv.addEventListener("touchend",up,{passive:false});
  cv.addEventListener("mousedown",function(e){ down(e); function mm(ev){move(ev);} function mu(ev){up(ev);window.removeEventListener("mousemove",mm);window.removeEventListener("mouseup",mu);} window.addEventListener("mousemove",mm); window.addEventListener("mouseup",mu); });
}

// ===========================================================================
//  Boot
// ===========================================================================
function boot(){
  var p=document.getElementById("prompt"); p.textContent=SPEC.prompt||""; p.style.color=THEME.onSurface;
  var g=document.getElementById("goal"); if(SPEC.goal){ g.textContent="✦ "+SPEC.goal; g.style.color=THEME.subtext; } else g.classList.add("hidden");
  var mod=MODULES[SPEC.type];
  if(!mod){ p.textContent="—"; return; }
  function start(){ active=mod; entrance=REDUCE?1:0; lastTs=0; if(active.init) active.init(SPEC); resize(); requestRender(); postEvent({event:"open"}); }
  if(SPEC.collapsed){ var cover=document.getElementById("cover"); cover.classList.remove("hidden");
    var btn=document.getElementById("coverBtn"); btn.style.background=THEME.primary; btn.style.color="#FFF";
    btn.addEventListener("click",function(){ cover.classList.add("hidden"); start(); }); }
  else start();
  bindPointers();
  window.addEventListener("resize", resize);
  if(window.ResizeObserver){ try{ new ResizeObserver(function(){ if(active) resize(); }).observe(document.getElementById("stage")); }catch(e){} }
  // Layout-settling fallbacks; the last one force-reveals if the rAF loop never ran (flaky WebView).
  [60,200,500,1100].forEach(function(ms){ setTimeout(function(){ if(!active) return; if(ms>=1100 && entrance<0.05) entrance=1; resize(); }, ms); });
}
if(document.readyState==="loading") window.addEventListener("load",boot); else setTimeout(boot,0);
</script>
